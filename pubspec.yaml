name: saarthi
description: "Saarthi - Voice-first assistant for elderly Indian users"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5
  go_router: ^14.0.0
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  vosk_flutter_2: ^1.0.5
  flutter_tts: ^4.2.0
  permission_handler: ^11.0.0
  flutter_foreground_task: ^8.11.0
  geolocator: ^13.0.2
  google_fonts: ^6.2.1
  lottie: ^3.1.3
  connectivity_plus: ^6.1.1
  url_launcher: ^6.3.1
  flutter_svg: ^2.0.13
  fuzzy: ^0.5.1
  uuid: ^4.5.1
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^5.0.0

dependency_overrides:
  http: ^1.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
